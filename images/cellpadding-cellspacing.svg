<svg width="340" height="150" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arrow-start" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 5 L 10 0 L 10 10 z" fill="#555" />
    </marker>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 10 5 L 0 0 L 0 10 z" fill="#555" />
    </marker>
  </defs>
  
  <!-- Cellpadding -->
  <text x="10" y="20" font-weight="bold">cellpadding (iç dolgu)</text>
  <rect x="10" y="30" width="130" height="70" fill="#f9f9f9" stroke="#333" stroke-width="1.5"/>
  <text x="75" y="65" text-anchor="middle">içerik</text>
  <line x1="10" y1="45" x2="45" y2="45" stroke="#e74c3c" stroke-width="1.5" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <text x="27.5" y="40" fill="#e74c3c" font-size="10" text-anchor="middle">padding</text>

  <!-- Cellspacing -->
  <text x="180" y="20" font-weight="bold">cellspacing (hücre aralığı)</text>
  <rect x="180" y="30" width="70" height="70" fill="#f9f9f9" stroke="#333" stroke-width="1.5"/>
  <text x="215" y="65" text-anchor="middle">hücre 1</text>
  <rect x="260" y="30" width="70" height="70" fill="#f9f9f9" stroke="#333" stroke-width="1.5"/>
  <text x="295" y="65" text-anchor="middle">hücre 2</text>
  <line x1="250" y1="110" x2="260" y2="110" stroke="#2980b9" stroke-width="1.5" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <text x="255" y="125" fill="#2980b9" font-size="10" text-anchor="middle">spacing</text>
</svg>