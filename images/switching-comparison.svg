<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
    <!-- Base Styles -->
    <style>
        .title { font-family: Helvetica, Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
        .node { fill: #E8E8E8; stroke: #555; stroke-width: 2; }
        .node-text { font-family: Helvetica, Arial, sans-serif; font-size: 14px; fill: #333; text-anchor: middle; dominant-baseline: middle; }
        .target { fill: #A9F5A9; }
        .edge { fill: none; stroke: #555; stroke-width: 2; marker-end: url(#arrow); }
        .edge-dotted { fill: none; stroke: #555; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrow); }
        .edge-label { font-family: Helvetica, Arial, sans-serif; font-size: 12px; fill: #111; text-anchor: middle; font-weight: bold; }
        .label-bg { fill: #FAFAFA; opacity: 0.9; }
        .cluster-box { fill: #FAFAFA; stroke: #333; stroke-width: 2; stroke-dasharray: 8,4; }
    </style>
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
        </marker>
    </defs>

    <!-- Cluster 1: Devre Anahtarlama -->
    <rect class="cluster-box" x="20" y="20" width="760" height="150" rx="10" />
    <text class="title" x="400" y="45" text-anchor="middle">Devre Anahtarlama (Önceden Tahsis Edilmiş Sabit Hat)</text>

    <rect class="node" x="60" y="80" width="100" height="40" rx="5" />
    <text class="node-text" x="110" y="100">Kaynak</text>

    <rect class="node" x="250" y="80" width="100" height="40" rx="5" />
    <text class="node-text" x="300" y="100">Düğüm 1</text>

    <rect class="node" x="440" y="80" width="100" height="40" rx="5" />
    <text class="node-text" x="490" y="100">Düğüm 2</text>

    <ellipse class="node target" cx="680" cy="100" rx="60" ry="20" />
    <text class="node-text" x="680" y="100">Hedef</text>

    <path class="edge" d="M 160 100 L 240 100" />
    <path class="edge" d="M 350 100 L 430 100" />
    <path class="edge" d="M 540 100 L 610 100" />

    <!-- Cluster 2: Paket Anahtarlama -->
    <rect class="cluster-box" x="20" y="190" width="760" height="240" rx="10" />
    <text class="title" x="400" y="215" text-anchor="middle">Paket Anahtarlama (Dinamik Rota Seçimi)</text>

    <rect class="node" x="60" y="290" width="100" height="40" rx="5" />
    <text class="node-text" x="110" y="310">Kaynak</text>

    <rect class="node" x="250" y="250" width="120" height="40" rx="5" />
    <text class="node-text" x="310" y="270">Yönlendirici 1</text>

    <rect class="node" x="250" y="340" width="120" height="40" rx="5" />
    <text class="node-text" x="310" y="360">Yönlendirici 2</text>

    <rect class="node" x="460" y="290" width="120" height="40" rx="5" />
    <text class="node-text" x="520" y="310">Yönlendirici 3</text>

    <ellipse class="node target" cx="680" cy="310" rx="60" ry="20" />
    <text class="node-text" x="680" y="310">Hedef</text>

    <!-- Edges for Cluster 2 -->
    <!-- Kaynak to Yön 1 -->
    <path class="edge" d="M 160 300 L 240 280" />
    <rect class="label-bg" x="165" y="272" width="60" height="14" rx="3" />
    <text class="edge-label" x="195" y="283">Paket 1, 2</text>

    <!-- Kaynak to Yön 2 -->
    <path class="edge" d="M 160 320 L 240 350" />
    <rect class="label-bg" x="175" y="340" width="50" height="14" rx="3" />
    <text class="edge-label" x="200" y="351">Paket 3</text>

    <!-- Yön 1 to Yön 3 -->
    <path class="edge" d="M 370 280 L 450 300" />
    <rect class="label-bg" x="385" y="274" width="50" height="14" rx="3" />
    <text class="edge-label" x="410" y="285">Paket 1</text>

    <!-- Yön 2 to Yön 3 -->
    <path class="edge" d="M 370 350 L 450 320" />
    <rect class="label-bg" x="385" y="340" width="50" height="14" rx="3" />
    <text class="edge-label" x="410" y="351">Paket 3</text>

    <!-- Yön 1 to Hedef (Dotted) -->
    <path class="edge-dotted" d="M 370 260 Q 500 210 650 295" />
    <rect class="label-bg" x="490" y="224" width="50" height="14" rx="3" />
    <text class="edge-label" x="515" y="235">Paket 2</text>

    <!-- Yön 3 to Hedef -->
    <path class="edge" d="M 580 310 L 610 310" />
    <rect class="label-bg" x="575" y="288" width="60" height="14" rx="3" />
    <text class="edge-label" x="605" y="299">Paket 1, 3</text>
</svg>