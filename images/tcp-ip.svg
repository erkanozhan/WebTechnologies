<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
    <rect width="500" height="400" fill="#f8f9fa"/>
    
    <rect x="50" y="50" width="400" height="60" rx="5" fill="#3498db"/>
    <text x="250" y="85" fill="white" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">Uygulama Verisi (Data)</text>

    <path d="M 250 110 L 250 140" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="50" y="150" width="400" height="80" rx="5" fill="#e67e22"/>
    <text x="250" y="175" fill="white" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">TCP Katmanı</text>
    <text x="250" y="200" fill="white" font-family="Arial" font-size="14" text-anchor="middle">Veriyi paketlere böler, sıra numarası ekler.</text>
    
    <!-- TCP Segments -->
    <rect x="100" y="210" width="80" height="30" fill="#d35400"/>
    <text x="140" y="230" fill="white" font-family="Arial" font-size="12" text-anchor="middle">Segment 1</text>
    <rect x="210" y="210" width="80" height="30" fill="#d35400"/>
    <text x="250" y="230" fill="white" font-family="Arial" font-size="12" text-anchor="middle">Segment 2</text>
    <rect x="320" y="210" width="80" height="30" fill="#d35400"/>
    <text x="360" y="230" fill="white" font-family="Arial" font-size="12" text-anchor="middle">Segment 3</text>

    <path d="M 250 230 L 250 260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="50" y="270" width="400" height="80" rx="5" fill="#27ae60"/>
    <text x="250" y="295" fill="white" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">IP Katmanı</text>
    <text x="250" y="320" fill="white" font-family="Arial" font-size="14" text-anchor="middle">Kaynak ve Hedef IP adreslerini ekler, yönlendirir.</text>
    
    <rect x="100" y="330" width="100" height="30" fill="#2ecc71"/>
    <text x="150" y="350" fill="white" font-family="Arial" font-size="12" text-anchor="middle">[IP] + [Seg 1]</text>
    <rect x="210" y="330" width="100" height="30" fill="#2ecc71"/>
    <text x="260" y="350" fill="white" font-family="Arial" font-size="12" text-anchor="middle">[IP] + [Seg 2]</text>
    <rect x="320" y="330" width="100" height="30" fill="#2ecc71"/>
    <text x="370" y="350" fill="white" font-family="Arial" font-size="12" text-anchor="middle">[IP] + [Seg 3]</text>

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#333" />
        </marker>
    </defs>
</svg>