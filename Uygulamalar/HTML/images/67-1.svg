<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 95" font-family="sans-serif" font-size="14">
  <!-- Kırtasiye: rowspan=2, iki satırı kaplıyor -->
  <rect x="1" y="1" width="120" height="60" fill="#eaf2f8" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="61" y="36" text-anchor="middle" font-weight="bold">Kırtasiye</text>
  <!-- Satır 1 verileri -->
  <rect x="121" y="1" width="120" height="30" fill="#fff" stroke="#bdc3c7"/>
  <rect x="241" y="1" width="118" height="30" fill="#fff" stroke="#bdc3c7"/>
  <text x="181" y="21" text-anchor="middle">Kalem</text>
  <text x="300" y="21" text-anchor="middle">114</text>
  <!-- Satır 2 verileri -->
  <rect x="121" y="31" width="120" height="30" fill="#fff" stroke="#bdc3c7"/>
  <rect x="241" y="31" width="118" height="30" fill="#fff" stroke="#bdc3c7"/>
  <text x="181" y="51" text-anchor="middle">Defter</text>
  <text x="300" y="51" text-anchor="middle">89</text>
  <!-- Dış çerçeve -->
  <rect x="1" y="1" width="358" height="60" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
</svg>