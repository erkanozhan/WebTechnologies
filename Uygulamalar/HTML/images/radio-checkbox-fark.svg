<svg xmlns="http://www.w3.org/2000/svg" width="600" height="305" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="600" height="305" fill="#f9fafb" rx="10"/>

  <!-- Title -->
  <text x="300" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Radyo Düğmesi ve Onay Kutusu Karşılaştırması</text>

  <!-- Left panel: radio -->
  <rect x="15" y="35" width="265" height="258" fill="#fff" stroke="#2471a3" stroke-width="2" rx="8"/>
  <text x="147" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#2471a3">type="radio"</text>
  <text x="147" y="74" text-anchor="middle" font-size="11" fill="#666">Tek seçim · sadece biri aktif</text>

  <!-- Radio 1: selected -->
  <circle cx="47" cy="113" r="9" fill="#fff" stroke="#2471a3" stroke-width="2"/>
  <circle cx="47" cy="113" r="4"  fill="#2471a3"/>
  <text x="65" y="118" font-size="13" fill="#333">25 altı</text>

  <!-- Radio 2 -->
  <circle cx="47" cy="150" r="9" fill="#fff" stroke="#ccc" stroke-width="2"/>
  <text x="65" y="155" font-size="13" fill="#aaa">25 – 34</text>

  <!-- Radio 3 -->
  <circle cx="47" cy="187" r="9" fill="#fff" stroke="#ccc" stroke-width="2"/>
  <text x="65" y="192" font-size="13" fill="#aaa">35 – 44</text>

  <!-- Radio 4 -->
  <circle cx="47" cy="224" r="9" fill="#fff" stroke="#ccc" stroke-width="2"/>
  <text x="65" y="229" font-size="13" fill="#aaa">45+</text>

  <!-- Radio note -->
  <text x="147" y="258" text-anchor="middle" font-size="11" fill="#c0392b">Biri seçilince diğerleri</text>
  <text x="147" y="272" text-anchor="middle" font-size="11" fill="#c0392b">otomatik iptal olur</text>

  <!-- Right panel: checkbox -->
  <rect x="320" y="35" width="265" height="258" fill="#fff" stroke="#148f77" stroke-width="2" rx="8"/>
  <text x="452" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#148f77">type="checkbox"</text>
  <text x="452" y="74" text-anchor="middle" font-size="11" fill="#666">Çoklu seçim · birden fazlası aktif</text>

  <!-- Checkbox 1: checked -->
  <rect x="342" y="103" width="19" height="19" fill="#148f77" rx="3"/>
  <polyline points="345,112 350,117 358,106" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="372" y="117" font-size="13" fill="#333">Halk</text>

  <!-- Checkbox 2: checked -->
  <rect x="342" y="140" width="19" height="19" fill="#148f77" rx="3"/>
  <polyline points="345,149 350,154 358,143" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="372" y="154" font-size="13" fill="#333">Pop</text>

  <!-- Checkbox 3: unchecked -->
  <rect x="342" y="177" width="19" height="19" fill="#fff" stroke="#ccc" stroke-width="2" rx="3"/>
  <text x="372" y="191" font-size="13" fill="#aaa">Rock</text>

  <!-- Checkbox 4: unchecked -->
  <rect x="342" y="214" width="19" height="19" fill="#fff" stroke="#ccc" stroke-width="2" rx="3"/>
  <text x="372" y="228" font-size="13" fill="#aaa">Jazz</text>

  <!-- Checkbox note -->
  <text x="452" y="258" text-anchor="middle" font-size="11" fill="#148f77">Seçimler birbirinden</text>
  <text x="452" y="272" text-anchor="middle" font-size="11" fill="#148f77">bağımsızdır</text>
</svg>
